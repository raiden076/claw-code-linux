name: Build Linux Binary

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
            # Install aarch64 musl target linker
            sudo apt-get install -y libc6-dev-arm64-cross
          else
            sudo apt-get install -y musl-tools
          fi

      - name: Configure cargo for cross-compilation
        run: |
          mkdir -p .cargo
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            cat > .cargo/config.toml << 'EOF'
            [target.aarch64-unknown-linux-musl]
            linker = "aarch64-linux-gnu-gcc"
            rustflags = ["-C", "target-feature=+crt-static", "-C", "link-self-contained=yes"]
            EOF
          else
            cat > .cargo/config.toml << 'EOF'
            [target.x86_64-unknown-linux-musl]
            rustflags = ["-C", "target-feature=+crt-static", "-C", "link-self-contained=yes"]
            EOF
          fi
        working-directory: ./rust

      - name: Build static release binary
        working-directory: ./rust
        run: cargo build --release --package rusty-claude-cli --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"

      - name: Strip binary
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            strip rust/target/${{ matrix.target }}/release/claw
          else
            aarch64-linux-gnu-strip rust/target/${{ matrix.target }}/release/claw || true
          fi

      - name: Verify static linking
        run: |
          echo "Checking binary linking..."
          if ldd rust/target/${{ matrix.target }}/release/claw 2>&1 | grep -q "not a dynamic executable"; then
            echo "✅ Binary is fully static!"
          elif ldd rust/target/${{ matrix.target }}/release/claw 2>&1 | grep -q "statically linked"; then
            echo "✅ Binary is fully static!"
          else
            echo "⚠️  Warning: Binary may have dynamic dependencies:"
            ldd rust/target/${{ matrix.target }}/release/claw || true
          fi

      - name: Create archive
        run: |
          mkdir -p dist
          cp rust/target/${{ matrix.target }}/release/claw dist/claw-${{ matrix.target }}
          chmod +x dist/claw-${{ matrix.target }}
          tar -czf claw-${{ matrix.target }}.tar.gz -C dist claw-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claw-${{ matrix.target }}
          path: claw-${{ matrix.target }}.tar.gz

  create-release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: claw-*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
