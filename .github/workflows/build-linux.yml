name: Build Linux Binary

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cargo
        working-directory: ./rust
        run: |
          mkdir -p .cargo
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cat > .cargo/config.toml << 'EOF'
            [target.aarch64-unknown-linux-gnu]
            linker = "aarch64-linux-gnu-gcc"
            EOF
          fi

      - name: Build release binary
        working-directory: ./rust
        run: cargo build --release --package rusty-claude-cli --target ${{ matrix.target }}

      - name: Strip binary
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        working-directory: ./rust
        run: strip target/${{ matrix.target }}/release/claw

      - name: Package binary
        run: |
          mkdir -p dist
          cp rust/target/${{ matrix.target }}/release/claw dist/claw-${{ matrix.target }}
          chmod +x dist/claw-${{ matrix.target }}
          tar -czf claw-${{ matrix.target }}.tar.gz -C dist claw-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claw-${{ matrix.target }}
          path: claw-${{ matrix.target }}.tar.gz

  create-release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
